name: Bug report
description: Report a codex-app-linux packaging, launch, update, or web runtime bug.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include the exact package and system details so we can reproduce the Linux build, not upstream macOS behavior.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which Linux package is installed?
      options:
        - codex-app-unofficial
        - codex-app-beta-unofficial
        - AppImage
        - npm package
        - local build
        - other
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: codex-app-linux version
      description: Paste the installed package version.
      placeholder: "codex-app-beta-unofficial 26.611.61753_beta.4009.launcher.30-1"
    validations:
      required: true

  - type: input
    id: codex-cli-version
    attributes:
      label: Codex CLI version
      description: If the bug involves CLI handoff, terminal launch, or node_repl, paste `codex --version`.
      placeholder: "codex-cli 0.0.0"

  - type: dropdown
    id: affected-surface
    attributes:
      label: Affected surface
      options:
        - desktop app launch
        - desktop app runtime
        - web server / browser runtime
        - update / install
        - node_repl / bundled runtime
        - AUR packaging
        - AppImage
        - other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / distro
      description: Include distro name and version.
      placeholder: "Arch Linux, EndeavourOS, Ubuntu 24.04, Fedora 42"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: CPU architecture
      options:
        - x86_64
        - arm64 / aarch64
        - other
    validations:
      required: true

  - type: input
    id: install-command
    attributes:
      label: Install / update command
      description: Command that installed or updated the package.
      placeholder: "yay -S codex-app-beta-unofficial"

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact steps from a clean terminal or fresh app launch.
      placeholder: |
        1. Run `codex-app-linux-beta`
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What happened instead?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / terminal output
      description: Paste relevant terminal output, install logs, console errors, or screenshots. Use fenced code blocks for long logs.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: "Anything else that might matter: auth state, custom CODEX_CLI_PATH, proxy/VPN, GPU/driver notes, local patches, or whether upstream Codex works elsewhere."
